apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apps-ingress
  namespace: apps
spec:
  ingressClassName: nginx
  rules:
  - host: daycare.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: daycare-app-service
            port:
              number: 80

  - host: nursing.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nursinghome-app-service
            port:
              number: 80

  - host: store.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fashion-store-service
            port:
              number: 80