apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/seidutee/devops-k8s-gitops-project.git
    targetRevision: HEAD
    path: monitoring/

  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  syncPolicy:
    automated:
      prune: true
      selfHeal: true